# Change the prefix to C-a
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

set-option -g prefix C-a

unbind C-b
bind C-a send-prefix

# Improve response time
set-option -sg escape-time 10

# Enable pane synchronization
bind-key S set-window-option synchronize-panes on
bind-key s set-window-option synchronize-panes off

# Dracula theme (status bar)
set -g @dracula-show-powerline true
set -g @dracula-transparent-powerline-bg true
set -g @dracula-show-edge-icons true

# tmux global status bar base style (prevents green default/theme bleed-through)
set -g status-style "bg=colour235,fg=colour250"

# If the whole bar looks "green", it's usually because Dracula uses its
# `green` color for the left widget / accents. Override it to a Dracula purple.
set -g @dracula-colors " green='#6272a4' "

# Powerline separators
set -g @dracula-show-left-sep 
set -g @dracula-show-right-sep 

set -g @dracula-plugins "cpu-usage ram-usage battery git time weather"

# Widget color overrides (bg fg)
set -g @dracula-cpu-usage-colors "orange dark_gray"
set -g @dracula-ram-usage-colors "cyan dark_gray"
set -g @dracula-battery-colors "pink dark_gray"
set -g @dracula-git-colors "light_purple dark_gray"
set -g @dracula-time-colors "dark_purple white"
set -g @dracula-weather-colors "orange dark_gray"

# Weather options
set -g @dracula-show-fahrenheit false
# set -g @dracula-fixed-location "Sevilla"
# set -g @dracula-show-location false
set -g @dracula-weather-hide-errors true

# Pane numbering
set-option -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
setw -g mode-keys vi

# Custom key bindings
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Mouse support
set-option -g mouse on

# Initialize TMUX plugin manager (keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'
